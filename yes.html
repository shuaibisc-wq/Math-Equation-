<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Story | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body, html { margin: 0; padding: 0; background-color: #ffcccc; color: #fff; font-family: 'Great Vibes', cursive; height: 100%; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        #story-container {
            width: 80%; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
        }
        #princess-dance { width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 0 50px rgba(255,255,255,0.7); margin-bottom: 50px;}
        #message-p { font-size: 3.5rem; color: #ff007f; text-shadow: 0 0 25px rgba(255,255,255,0.8); }
        .hidden { display: none; }
        .visible { display: block; animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="starboy" src="starboy.mp3" autoplay loop></audio>

    <div id="story-container">
        <img id="princess-dance" src="cinderella-dance.gif" alt="Cinderella Dance"> 

        <div id="messages">
            <p class="hidden message">Yes! My love, Yes!</p>
            <p class="hidden message">Prova, you've made me the happiest person in the world!</p>
            <p class="hidden message">I promise to fill every day of our life with happiness, just like in a fairytale.</p>
            <p class="hidden message">You are my princess, and I am your starboy.</p>
            <p class="hidden message">Together forever, in our beautiful universe.</p>
            <p class="hidden message">I will love you always.</p>
        </div>
        <p id="message-p"></p>
    </div>

    <script>
        const messages = document.querySelectorAll('.message');
        const messageP = document.getElementById('message-p');
        let currentMessage = 0;

        function showNextMessage() {
            if (currentMessage < messages.length) {
                messageP.innerText = messages[currentMessage].innerText;
                messageP.className = 'visible';
                currentMessage++;
                setTimeout(() => {
                    messageP.className = 'hidden';
                    setTimeout(showNextMessage, 500); // 0.5 sec break
                }, 4000); // 4 seconds message
            }
        }
        showNextMessage();
    </script>
</body>
</html>
