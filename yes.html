<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Story | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #ffb6c1; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #bg-gif {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover; display: block;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
            pointer-events: none;
        }

        #story-container {
            width: 85%; text-align: center; z-index: 10;
            pointer-events: none;
        }

        #message-p { 
            font-family: 'Great Vibes', cursive; font-size: 3.5rem; 
            color: #fff; text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f; 
            min-height: 160px; transition: opacity 0.5s ease;
            line-height: 1.3;
        }

        #next-btn {
            position: fixed; bottom: 50px; 
            background: none; border: none;
            color: #fff; font-family: 'Crimson Text', serif;
            font-style: italic; font-size: 1.8rem; cursor: pointer;
            text-shadow: 0 0 15px #ff007f;
            animation: pulseGlow 1.5s infinite alternate;
            z-index: 100; letter-spacing: 2px;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            from { opacity: 0.6; transform: scale(1); }
            to { opacity: 1; transform: scale(1.05); }
        }

        @media (max-width: 600px) {
            #message-p { font-size: 2.5rem; }
            #next-btn { font-size: 1.3rem; }
        }
    </style>
</head>
<body onclick="showNextMessage()">

    <audio id="starboy" src="starboy.mp3" preload="auto" loop></audio>

    <img id="bg-gif" src="cinderella-dance.gif" alt="Background">
    <div class="overlay"></div>

    <div id="story-container">
        <p id="message-p">Yes! My love, Yes! ❤️</p>
    </div>

    <button id="next-btn">Tap anywhere to hear my heart...</button>

    <script>
        const messages = [
            "Yes! My love, Yes! ❤️",
            "Prova, you've made me the happiest person!",
            "I promise to fill every day with fairytales...",
            "You are my princess, and I am your starboy.",
            "In every universe, I'd still choose you.",
            "Forever isn't enough to love you. 🥺",
            "Together forever... always yours, Shuaib."
        ];

        let currentMessage = 0;
        const song = document.getElementById('starboy');
        const messageP = document.getElementById('message-p');
        const nextBtn = document.getElementById('next-btn');

        // Gaaner key moment-er time (seconds-e)
        const keyMoment = 26; 

        function showNextMessage() {
            // First interaction-e gaan shuru hobe
            if (song.paused) {
                song.currentTime = keyMoment; // 26 second point theke shuru hobe
                song.play().catch(e => console.log("Waiting for user tap..."));
            }

            currentMessage++;
            if (currentMessage < messages.length) {
                messageP.style.opacity = 0;
                setTimeout(() => {
                    messageP.innerText = messages[currentMessage];
                    messageP.style.opacity = 1;
                }, 400);

                if(currentMessage === messages.length - 1) {
                    nextBtn.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
