<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Story | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #ffcccc;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* GIF Full Screen Fix for Samsung */
        #princess-dance { 
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }

        #overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        #story-container { width: 90%; text-align: center; z-index: 10; }

        #message-p { 
            font-family: 'Great Vibes', cursive; font-size: 3.2rem; 
            color: #fff; text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f; 
            min-height: 120px; transition: opacity 0.5s;
        }

        #instruction {
            position: fixed; bottom: 30px; font-family: 'Crimson Text', serif;
            font-style: italic; font-size: 1.3rem; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 10px #ff007f;
            animation: breathe 2s infinite alternate;
        }

        @keyframes breathe {
            from { opacity: 0.3; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body onclick="playEverything()">

    <audio id="starboy" src="starboy.mp3" preload="auto" loop></audio>

    <img id="princess-dance" src="cinderella-dance.gif" alt="Cinderella Dance"> 
    <div id="overlay"></div>

    <div id="story-container">
        <p id="message-p">Yes! My love, Yes! ❤️</p>
    </div>

    <div id="instruction">Tap anywhere to hear my heart...</div>

    <script>
        const messages = [
            "Yes! My love, Yes! ❤️",
            "Prova, you've made me the happiest person!",
            "I promise to fill every day with fairytales...",
            "You are my princess, and I am your starboy.",
            "In every universe, I'd still choose you.",
            "Forever isn't enough to love you. 🥺",
            "Together forever... always yours, Shuaib."
        ];

        let currentMessage = 0;
        let isStarted = false;
        const messageP = document.getElementById('message-p');
        const instruction = document.getElementById('instruction');
        const song = document.getElementById('starboy');

        function playEverything() {
            // Samsung/Android Force Play Logic
            if (!isStarted) {
                song.currentTime = 26; // Start from key moment
                song.play();
                isStarted = true;
            }

            // Message changing logic
            currentMessage++;
            if (currentMessage < messages.length) {
                messageP.style.opacity = 0; 
                setTimeout(() => {
                    messageP.innerText = messages[currentMessage];
                    messageP.style.opacity = 1; 
                }, 400);

                if(currentMessage === messages.length - 1) {
                    instruction.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
