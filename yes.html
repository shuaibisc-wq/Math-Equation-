<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Story | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #ffb6c1; /* Fallback color */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* GIF Background - Absolute position */
        #bg-gif {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
            display: block;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: -1;
        }

        #story-container {
            width: 90%; text-align: center; z-index: 10; pointer-events: none;
        }

        #message-p { 
            font-family: 'Great Vibes', cursive; font-size: 3.5rem; 
            color: #fff; text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f; 
            min-height: 150px; transition: opacity 0.5s;
            line-height: 1.2;
        }

        #next-btn {
            position: fixed; bottom: 40px; 
            background: none; border: none;
            color: #fff; font-family: 'Times New Roman', serif;
            font-style: italic; font-size: 1.5rem; letter-spacing: 2px;
            text-shadow: 0 0 15px #ff007f;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 600px) { #message-p { font-size: 2.5rem; } }
    </style>
</head>
<body onclick="handleInteraction()">

    <audio id="starboy" src="starboy.mp3" preload="auto" loop></audio>

    <img id="bg-gif" src="cinderella-dance.gif" onerror="this.style.display='none'; document.body.style.background='#ff007f';">
    
    <div class="overlay"></div>

    <div id="story-container">
        <p id="message-p">Yes! My love, Yes! ❤️</p>
    </div>

    <button id="next-btn">Tap anywhere to hear my heart...</button>

    <script>
        const messages = [
            "Yes! My love, Yes! ❤️",
            "Prova, you've made me the happiest person!",
            "I promise to fill every day with fairytales...",
            "You are my princess, and I am your starboy.",
            "In every universe, I'd still choose you.",
            "Forever isn't enough to love you. 🥺",
            "Together forever... always yours, Shuaib."
        ];

        let currentMessage = 0;
        let audioStarted = false;
        const song = document.getElementById('starboy');
        const messageP = document.getElementById('message-p');

        function handleInteraction() {
            // Audio Play Logic
            if (!audioStarted) {
                song.currentTime = 26; // Starboy catchy part
                song.play().then(() => {
                    audioStarted = true;
                }).catch(e => console.log("Click again to play sound"));
            }

            // Message Change Logic
            currentMessage++;
            if (currentMessage < messages.length) {
                messageP.style.opacity = 0;
                setTimeout(() => {
                    messageP.innerText = messages[currentMessage];
                    messageP.style.opacity = 1;
                }, 400);

                if(currentMessage === messages.length - 1) {
                    document.getElementById('next-btn').style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
