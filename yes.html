<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever Story | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #ffb6c1; /* লোড হওয়ার আগে হালকা পিঙ্ক */
            display: flex; justify-content: center; align-items: center;
        }

        #bg-gif {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
            background: url('cinderella-dance.gif') no-repeat center center;
            background-size: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35); z-index: -1;
        }

        #message-p { 
            font-family: 'Great Vibes', cursive; font-size: 3.5rem; 
            color: #fff; text-shadow: 0 0 20px #ff007f; text-align: center;
            padding: 20px; z-index: 10; pointer-events: none;
        }

        #next-btn {
            position: fixed; bottom: 40px; color: #fff; font-size: 1.5rem;
            text-shadow: 0 0 10px #ff007f; animation: pulse 1.5s infinite;
            background: none; border: none; font-style: italic;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body onclick="showNextMessage()">

    <audio id="starboy" src="starboy.mp3" autoplay loop></audio>

    <div id="bg-gif"></div>
    <div class="overlay"></div>

    <p id="message-p">Yes! My love, Yes! ❤️</p>
    <button id="next-btn">Tap anywhere to hear me...</button>

    <script>
        const messages = [
            "Yes! My love, Yes! ❤️",
            "Prova, you've made me the happiest person!",
            "I promise to fill every day with fairytales...",
            "You are my princess, and I am your starboy.",
            "In every universe, I'd still choose you.",
            "Forever isn't enough to love you. 🥺",
            "Together forever... always yours, Shuaib."
        ];

        let currentMessage = 0;
        function showNextMessage() {
            currentMessage++;
            if (currentMessage < messages.length) {
                const p = document.getElementById('message-p');
                p.style.opacity = 0;
                setTimeout(() => {
                    p.innerText = messages[currentMessage];
                    p.style.opacity = 1;
                }, 400);
                if(currentMessage === messages.length - 1) {
                    document.getElementById('next-btn').style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
