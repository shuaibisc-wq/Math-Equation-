<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theorem of Love | Prova</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: 'Georgia', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; } 
        #heartCanvas { z-index: 5; }

        #cover-page {
            position: fixed; z-index: 20; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(5, 5, 5, 0.95); color: white; transition: opacity 1.5s;
        }

        h1 { font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 40px; font-style: italic; text-align: center; }
        
        .btn {
            padding: 15px 40px; border: 1px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 4px; transition: 0.4s;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 20px #fff; }

        #loading-screen {
            position: fixed; z-index: 30; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #fff;
        }
        .bar-container { width: 280px; height: 3px; background: #222; margin-top: 20px; }
        .bar { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #final-msg {
            position: fixed; z-index: 40; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%); color: white;
            font-size: 3rem; font-style: italic; opacity: 0; 
            transition: opacity 3s; text-shadow: 0 0 20px #ff1493; pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="cover-page">
        <h1>THE THEOREM OF US</h1>
        <button class="btn" onclick="initiate()">START SYSTEM</button>
    </div>

    <div id="loading-screen">
        <div style="letter-spacing: 3px; font-family: 'Courier New';">INITIALIZING CALCULATION...</div>
        <div class="bar-container"><div class="bar" id="progressBar"></div></div>
    </div>

    <div id="final-msg">I Love You, Prova</div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const heart = document.getElementById('heartCanvas');
        const ctxB = bg.getContext('2d');
        const ctxH = heart.getContext('2d');

        let w, h;
        const equations = [
            "Rμν - 1/2 Rgμν = 8πG/c⁴ Tμν", "∇×E = -∂B/∂t", "∫e^-x² dx = √π",
            "iℏ∂/∂t Ψ = ĤΨ", "eiπ + 1 = 0", "P(A|B) = P(B|A)P(A)/P(B)",
            "Σ F = ma", "E = mc²", "ΔxΔp ≥ ℏ/2", "d/dx[sin x] = cos x"
        ];
        let parts = [];

        function resize() {
            w = bg.width = heart.width = window.innerWidth;
            h = bg.height = heart.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. HIGH VISIBILITY BACKGROUND
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * h; }
            reset() {
                this.x = Math.random() * w;
                this.y = h + 20;
                this.txt = equations[Math.floor(Math.random() * equations.length)];
                this.speed = 0.5 + Math.random();
                this.alpha = 0.3 + Math.random() * 0.5; // Increased brightness
            }
            draw() {
                ctxB.font = "14px 'Courier New'";
                ctxB.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctxB.fillText(this.txt, this.x, this.y);
                this.y -= this.speed;
                if (this.y < -20) this.reset();
            }
        }
        for(let i=0; i<40; i++) parts.push(new Particle());

        function animateBg() {
            ctxB.clearRect(0,0,w,h);
            parts.forEach(p => p.draw());
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // 2. COORDINATE SYSTEM
        function drawCoordinates() {
            ctxH.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctxH.lineWidth = 1;
            
            // X-Axis
            ctxH.beginPath();
            ctxH.moveTo(0, h/2); ctxH.lineTo(w, h/2);
            ctxH.stroke();
            
            // Y-Axis
            ctxH.beginPath();
            ctxH.moveTo(w/2, 0); ctxH.lineTo(w/2, h);
            ctxH.stroke();

            // Axis Labels
            ctxH.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctxH.font = "10px Arial";
            ctxH.fillText("X-AXIS (TIME)", w - 70, h/2 - 10);
            ctxH.fillText("Y-AXIS (AFFECTION)", w/2 + 10, 20);
        }

        // 3. LOGIC
        function initiate() {
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover-page').style.display = 'none';
                startLoad();
            }, 1000);
        }

        function startLoad() {
            const bar = document.getElementById('progressBar');
            document.getElementById('loading-screen').style.display = 'flex';
            let p = 0;
            const iv = setInterval(() => {
                p += 0.5;
                bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('loading-screen').style.display = 'none';
                    drawCoordinates();
                    startHeart();
                }
            }, 25); // 5 Seconds
        }

        function startHeart() {
            let t = 0;
            let pts = [];
            function draw() {
                if (t <= 2 * Math.PI) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const s = Math.min(w, h) / 45;
                    const cx = w/2 + x * s;
                    const cy = h/2 + y * s;
                    pts.push({x: cx, y: cy});

                    // Clear foreground but keep axes
                    ctxH.clearRect(0, 0, w, h);
                    drawCoordinates();

                    ctxH.strokeStyle = "#ff1493";
                    ctxH.lineWidth = 4;
                    ctxH.shadowBlur = 15;
                    ctxH.shadowColor = "#ff1493";
                    
                    ctxH.beginPath();
                    ctxH.moveTo(pts[0].x, pts[0].y);
                    pts.forEach(p => ctxH.lineTo(p.x, p.y));
                    ctxH.stroke();

                    t += 0.0051; // 20 Seconds
                    requestAnimationFrame(draw);
                } else {
                    fillHeart(pts);
                }
            }
            draw();
        }

        function fillHeart(pts) {
            let a = 0;
            const iv = setInterval(() => {
                a += 0.01;
                ctxH.fillStyle = `rgba(255, 20, 147, ${a})`;
                ctxH.beginPath();
                ctxH.moveTo(pts[0].x, pts[0].y);
                pts.forEach(p => ctxH.lineTo(p.x, p.y));
                ctxH.fill();
                if (a >= 0.6) {
                    clearInterval(iv);
                    document.getElementById('final-msg').style.opacity = '1';
                }
            }, 30);
        }
    </script>
</body>
</html>
