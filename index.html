<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Prova</title>
    <style>
        /* Base Styling */
        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #050505; /* Deep Black Theme */
            font-family: 'Georgia', serif; 
        }
        
        canvas { position: absolute; top: 0; left: 0; }
        
        /* Z-Index Layers */
        #bgCanvas { z-index: 1; opacity: 0.4; } /* Dim Math Background */
        #heartCanvas { z-index: 5; }             /* Main Heart Animation */

        /* Cover Page Overlay */
        #cover-page {
            position: fixed; z-index: 20; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(5, 5, 5, 0.9); color: white; transition: opacity 1.5s;
        }

        h1 { 
            font-size: 2.8rem; font-weight: 300; letter-spacing: 8px; 
            margin-bottom: 40px; text-align: center; font-style: italic;
            animation: pulse 3s infinite;
        }

        .btn {
            padding: 18px 45px; border: 1px solid rgba(255,255,255,0.3); background: none;
            color: white; cursor: pointer; letter-spacing: 3px; font-size: 0.8rem;
            font-family: 'Courier New', monospace; border-radius: 2px; transition: 0.5s;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,0.4); }

        /* Loading Overlay */
        #loading-screen {
            position: fixed; z-index: 30; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #777;
        }
        .bar-container { width: 280px; height: 2px; background: #1a1a1a; margin-top: 25px; }
        .bar { width: 0%; height: 100%; background: #ff2d55; box-shadow: 0 0 15px #ff2d55; }

        /* Final Message */
        #final-msg {
            position: fixed; z-index: 40; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%); color: white;
            font-size: 3.5rem; font-style: italic; opacity: 0; 
            transition: opacity 4s; pointer-events: none;
            text-shadow: 0 0 25px rgba(255, 20, 147, 0.9);
        }

        @keyframes pulse {
            0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="cover-page">
        <h1>THE THEOREM OF US</h1>
        <button class="btn" onclick="initiateSequence()">INITIATE CALCULATION</button>
    </div>

    <div id="loading-screen">
        <div style="letter-spacing: 4px; font-size: 11px; font-family: 'Courier New';">SOLVING COMPLEX IDENTITIES...</div>
        <div class="bar-container"><div class="bar" id="progressBar"></div></div>
    </div>

    <div id="final-msg">I Love You, Prova</div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const heart = document.getElementById('heartCanvas');
        const ctxBg = bg.getContext('2d');
        const ctxH = heart.getContext('2d');

        let w, h;
        const hardEquations = [
            "Rμν - 1/2 Rgμν + Λgμν = 8πG/c⁴ Tμν",
            "Ψ(r,t) = Ae^(i(k·r-ωt))",
            "∇ · E = ρ / ε₀",
            "∮ B · dl = μ₀(I + ε₀ dΦE/dt)",
            "ζ(s) = ∑ n⁻ˢ = ∏ (1 - p⁻ˢ)⁻¹",
            "eiπ + 1 = 0",
            "S = -k_B ∑ P_i ln P_i",
            "∂u/∂t = α(∂²u/∂x² + ∂²u/∂y²)",
            "L = √(-g) R",
            "d/dx ∫ f(t) dt = f(x)"
        ];
        let particleList = [];

        function resize() {
            w = bg.width = heart.width = window.innerWidth;
            h = bg.height = heart.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. BACKGROUND ENGINE (Drifting peculiar equations)
        class EquationNode {
            constructor() {
                this.init();
                this.y = Math.random() * h; // Start at random height
            }
            init() {
                this.x = Math.random() * w;
                this.y = h + 50;
                this.text = hardEquations[Math.floor(Math.random() * hardEquations.length)];
                this.speed = 0.3 + Math.random() * 0.7;
                this.size = 11 + Math.random() * 7;
                this.opacity = 0.1 + Math.random() * 0.5;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) this.init();
            }
            draw() {
                ctxBg.font = `${this.size}px 'Courier New'`;
                ctxBg.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctxBg.fillText(this.text, this.x, this.y);
            }
        }

        for(let i=0; i<35; i++) particleList.push(new EquationNode());

        function animateBackground() {
            ctxBg.clearRect(0, 0, w, h);
            particleList.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBackground);
        }
        animateBackground();

        // 2. SEQUENCE LOGIC
        function initiateSequence() {
            const cover = document.getElementById('cover-page');
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.display = 'none';
                startLoading();
            }, 1500);
        }

        function startLoading() {
            const screen = document.getElementById('loading-screen');
            const bar = document.getElementById('progressBar');
            screen.style.display = 'flex';
            
            let progress = 0;
            // Takes approx 5 seconds
            const interval = setInterval(() => {
                progress += 0.4;
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    screen.style.display = 'none';
                    startHeartAnimation();
                }
            }, 20); 
        }

        // 3. HEART DRAWING ENGINE
        function startHeartAnimation() {
            let t = 0;
            let points = [];
            
            function drawLoop() {
                if (t <= 2 * Math.PI) {
                    // Parametric Heart Equation
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const scale = Math.min(w, h) / 45;
                    const cx = w/2 + x * scale;
                    const cy = h/2 + y * scale;
                    
                    points.push({x: cx, y: cy});

                    ctxH.clearRect(0, 0, w, h);
                    
                    // Style the running red lines
                    ctxH.strokeStyle = "#ff1493";
                    ctxH.lineWidth = 3.5;
                    ctxH.shadowBlur = 20;
                    ctxH.shadowColor = "#ff1493";
                    
                    ctxH.beginPath();
                    ctxH.moveTo(points[0].x, points[0].y);
                    points.forEach(p => ctxH.lineTo(p.x, p.y));
                    ctxH.stroke();

                    // Slow drawing (approx 20 seconds)
                    t += 0.0051; 
                    requestAnimationFrame(drawLoop);
                } else {
                    finalize(points);
                }
            }
            drawLoop();
        }

        // 4. FILL AND SURPRISE
        function finalize(points) {
            let alpha = 0;
            const fillInterval = setInterval(() => {
                alpha += 0.008;
                ctxH.fillStyle = `rgba(220, 20, 60, ${alpha})`;
                ctxH.beginPath();
                ctxH.moveTo(points[0].x, points[0].y);
                points.forEach(p => ctxH.lineTo(p.x, p.y));
                ctxH.fill();

                if (alpha >= 0.6) {
                    clearInterval(fillInterval);
                    // Show final message
                    document.getElementById('final-msg').style.opacity = '1';
                }
            }, 30);
        }
    </script>
</body>
</html>
