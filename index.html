<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Prova</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Georgia', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        
        /* Layering */
        #bgCanvas { z-index: 1; opacity: 0.25; }
        #heartCanvas { z-index: 3; }

        /* Cover Page */
        #ui-layer {
            position: fixed; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; background: rgba(5, 5, 5, 0.8); transition: opacity 1.5s;
        }

        h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 5px; margin-bottom: 30px; text-align: center; }
        .btn {
            padding: 15px 40px; border: 1px solid rgba(255,255,255,0.4); background: none;
            color: white; cursor: pointer; letter-spacing: 2px; transition: 0.5s;
            font-family: 'Courier New', monospace; border-radius: 2px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* Loading Screen */
        #loading-screen {
            position: fixed; z-index: 15; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #666;
        }
        .progress-container { width: 250px; height: 2px; background: #111; margin-top: 20px; }
        .progress-bar { width: 0%; height: 100%; background: #ff2d55; box-shadow: 0 0 10px #ff2d55; }

        /* Final Message */
        #final-msg {
            position: fixed; z-index: 20; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%); color: white;
            font-size: 3rem; font-style: italic; opacity: 0; transition: opacity 3s;
            text-shadow: 0 0 20px rgba(255,20,147,0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="ui-layer">
        <h1>THE THEOREM OF US</h1>
        <button class="btn" onclick="startExecution()">INITIATE CALCULATION</button>
    </div>

    <div id="loading-screen">
        <div style="letter-spacing: 3px; font-size: 12px;">RESOLVING COMPLEX IDENTITIES...</div>
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
    </div>

    <div id="final-msg">I Love You, Prova</div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const heart = document.getElementById('heartCanvas');
        const ctxBg = bg.getContext('2d');
        const ctxH = heart.getContext('2d');

        let w, h;
        const equations = [
            "Rμν - 1/2 Rgμν = 8πG/c⁴ Tμν", "∇ × B = μ₀J + μ₀ε₀∂E/∂t", 
            "iℏ ∂/∂t Ψ(r,t) = Ĥ Ψ(r,t)", "L = T - V", "ds² = -(1-2M/r)dt²",
            "ζ(s) = ∑ n⁻ˢ", "d/dx [ln(x)] = 1/x", "E = mc²", "eiπ + 1 = 0"
        ];
        let mathStuff = [];

        function init() {
            w = bg.width = heart.width = window.innerWidth;
            h = bg.height = heart.height = window.innerHeight;
        }
        window.addEventListener('resize', init);
        init();

        // Background: Drifting Equations
        class MathText {
            constructor() {
                this.reset();
                this.y = Math.random() * h;
            }
            reset() {
                this.x = Math.random() * w;
                this.y = h + 50;
                this.text = equations[Math.floor(Math.random() * equations.length)];
                this.speed = 0.4 + Math.random() * 0.6;
                this.size = 12 + Math.random() * 6;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctxBg.font = `${this.size}px Courier New`;
                ctxBg.fillStyle = "rgba(200, 200, 200, 0.4)";
                ctxBg.fillText(this.text, this.x, this.y);
            }
        }

        for(let i=0; i<40; i++) mathStuff.push(new MathText());

        function loop() {
            ctxBg.clearRect(0,0,w,h);
            mathStuff.forEach(m => { m.update(); m.draw(); });
            requestAnimationFrame(loop);
        }
        loop();

        function startExecution() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                runLoading();
            }, 1500);
        }

        function runLoading() {
            const screen = document.getElementById('loading-screen');
            const bar = document.getElementById('bar');
            screen.style.display = 'flex';
            
            let progress = 0;
            const timer = setInterval(() => {
                progress += 0.4; // Controlled speed
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(timer);
                    screen.style.display = 'none';
                    drawHeartPath();
                }
            }, 20); // Exactly 5 seconds
        }

        function drawHeartPath() {
            let t = 0;
            let points = [];
            
            function animate() {
                if (t <= 2 * Math.PI) {
                    // The "Love Equation"
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const scale = Math.min(w, h) / 45;
                    const cx = w/2 + x * scale;
                    const cy = h/2 + y * scale;
                    
                    points.push({x: cx, y: cy});

                    ctxH.clearRect(0,0,w,h);
                    
                    // Drawing the line
                    ctxH.strokeStyle = "#ff2d55";
                    ctxH.lineWidth = 3;
                    ctxH.shadowBlur = 15;
                    ctxH.shadowColor = "#ff2d55";
                    
                    ctxH.beginPath();
                    ctxH.moveTo(points[0].x, points[0].y);
                    points.forEach(p => ctxH.lineTo(p.x, p.y));
                    ctxH.stroke();

                    t += 0.0051; // Speed tuned for ~20 seconds at 60fps
                    requestAnimationFrame(animate);
                } else {
                    fillAndSurprise(points);
                }
            }
            animate();
        }

        function fillAndSurprise(points) {
            let alpha = 0;
            const fillTimer = setInterval(() => {
                alpha += 0.01;
                ctxH.fillStyle = `rgba(255, 20, 147, ${alpha})`;
                ctxH.beginPath();
                ctxH.moveTo(points[0].x, points[0].y);
                points.forEach(p => ctxH.lineTo(p.x, p.y));
                ctxH.fill();

                if (alpha >= 0.5) {
                    clearInterval(fillTimer);
                    document.getElementById('final-msg').style.opacity = '1';
                }
            }, 30);
        }
    </script>
</body>
</html>
