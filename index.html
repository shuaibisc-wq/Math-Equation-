<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Prova</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Times New Roman', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; opacity: 0.6; } 
        #mainCanvas { z-index: 5; }

        /* UI Elements */
        #ui-layer { position: fixed; z-index: 20; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .interactive { pointer-events: auto; }

        #cover-page {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; color: white; transition: opacity 1.5s;
        }
        .btn {
            padding: 18px 50px; border: 1px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 2px; transition: 0.5s; letter-spacing: 4px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 50px #fff; }

        /* Mysterious Message Button */
        #jump-btn {
            display: none; padding: 15px 40px; background: rgba(255,255,255,0.1);
            border: 1px solid #fff; color: #fff; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 18px;
            animation: pulse 2s infinite; letter-spacing: 3px;
        }

        /* Final Royal Message */
        #final-msg-container {
            display: none; position: fixed; z-index: 200; width: 100%; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0;
            transition: opacity 3s;
        }
        #final-msg {
            color: #fff; font-size: 4rem; font-style: italic; font-weight: 300;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.4);
            letter-spacing: 5px;
        }

        /* White Flash Overlay */
        #flash { position: fixed; z-index: 150; top:0; left:0; width: 100%; height:100%; background:#fff; opacity:0; pointer-events:none; }

        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 10px #fff; } 50% { transform: scale(1.1); box-shadow: 0 0 30px #fff; } }
    </style>
</head>
<body>

    <audio id="mySong" src="music.mp3" loop></audio>
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>
    <div id="flash"></div>

    <div id="ui-layer">
        <div id="cover-page">
            <h1 style="letter-spacing: 15px; font-weight: 100; margin-bottom: 40px;">THE THEOREM OF US</h1>
            <button class="btn interactive" onclick="initiate()">INITIATE CALCULATION</button>
        </div>
        <button id="jump-btn" class="interactive" onclick="startWarp()">JUMP INTO THE HEART</button>
    </div>

    <div id="final-msg-container">
        <h2 id="final-msg">Forever Yours, My Love</h2>
    </div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const main = document.getElementById('mainCanvas');
        const ctxB = bg.getContext('2d');
        const ctxM = main.getContext('2d');
        const song = document.getElementById('mySong');
        
        let w, h, stage = "math", stars = [], heartPts = [], t = 0;
        const equations = ["E = mc²", "eiπ + 1 = 0", "∇×E = -∂B/∂t", "iℏ∂/∂t Ψ = ĤΨ", "Rμν - 1/2 Rgμν = κTμν"];
        let parts = [];

        function resize() {
            w = bg.width = main.width = window.innerWidth;
            h = bg.height = main.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Stage 1: Mathematical Background
        class Eq {
            constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = 0.5 + Math.random(); this.txt = equations[Math.floor(Math.random()*5)]; }
            draw() {
                ctxB.fillStyle = "rgba(255,255,255,0.4)";
                ctxB.font = "14px Courier New";
                ctxB.fillText(this.txt, this.x, this.y);
                this.y -= this.s; if(this.y < -50) this.y = h+50;
            }
        }
        for(let i=0; i<80; i++) parts.push(new Eq());

        function animate() {
            ctxB.clearRect(0,0,w,h);
            if(stage === "math") {
                parts.forEach(p => p.draw());
            } else if(stage === "warp" || stage === "final") {
                drawStars();
            }
            requestAnimationFrame(animate);
        }
        animate();

        function initiate() {
            song.play();
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('cover-page').style.display = 'none';
                startHeartAnim();
            }, 1500);
        }

        // Heart Drawing
        function startHeartAnim() {
            const scale = Math.min(w,h)/45;
            const drawHeart = () => {
                if(t <= 2 * Math.PI + 0.01) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
                    heartPts.push({x: w/2 + x * scale, y: h/2 + y * scale});
                    
                    ctxM.clearRect(0,0,w,h);
                    ctxM.strokeStyle = "#fff"; ctxM.lineWidth = 4; ctxM.shadowBlur = 20; ctxM.shadowColor = "#fff";
                    ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                    heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.stroke();
                    t += 0.01; requestAnimationFrame(drawHeart);
                } else {
                    fillHeart();
                }
            };
            drawHeart();
        }

        function fillHeart() {
            let alpha = 0;
            const iv = setInterval(() => {
                alpha += 0.01;
                ctxM.fillStyle = `rgba(255,255,255,${alpha})`;
                ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.fill();
                if(alpha >= 0.8) {
                    clearInterval(iv);
                    document.getElementById('jump-btn').style.display = 'block';
                }
            }, 30);
        }

        // Stage 2: Hyperspace Warp
        function startWarp() {
            document.getElementById('jump-btn').style.display = 'none';
            stage = "warp";
            // Create Starfield
            for(let i=0; i<400; i++) stars.push({ x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w, oZ: 0 });
            
            // Fade out Heart
            let opacity = 1;
            const fade = setInterval(() => {
                opacity -= 0.05; main.style.opacity = opacity;
                if(opacity <= 0) { clearInterval(fade); main.style.display = 'none'; }
            }, 50);

            // Warp Duration (8-9 seconds)
            setTimeout(() => { triggerFlash(); }, 8500);
        }

        function drawStars() {
            ctxB.fillStyle = "#000"; ctxB.fillRect(0,0,w,h);
            ctxB.save(); ctxB.translate(w/2, h/2);
            stars.forEach(s => {
                s.z -= (stage === "warp" ? 15 : 0.5); // Speed in warp vs final
                if(s.z <= 0) s.z = w;
                let sx = s.x * (w/s.z); let sy = s.y * (w/s.z);
                let r = 1.5 * (w/s.z);
                ctxB.fillStyle = "#fff";
                ctxB.beginPath(); ctxB.arc(sx, sy, r > 3 ? 3 : r, 0, Math.PI*2); ctxB.fill();
                
                // Motion blur lines during warp
                if(stage === "warp") {
                    ctxB.strokeStyle = "rgba(255,255,255,0.3)"; ctxB.lineWidth = 1;
                    ctxB.beginPath(); ctxB.moveTo(sx, sy);
                    let px = s.x * (w/(s.z+20)); let py = s.y * (w/(s.z+20));
                    ctxB.lineTo(px, py); ctxB.stroke();
                }
            });
            ctxB.restore();
        }

        // Stage 3: Supernova Flash and Message
        function triggerFlash() {
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            flash.style.transition = 'opacity 0.1s';
            
            setTimeout(() => {
                stage = "final";
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 4s';
                
                const msg = document.getElementById('final-msg-container');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.opacity = '1'; }, 100);
            }, 200);
        }
    </script>
</body>
</html>
