<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Prova</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Georgia', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; opacity: 0.65; } 
        #heartCanvas { z-index: 5; }

        /* Cover Page */
        #cover-page {
            position: fixed; z-index: 20; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; color: white; transition: opacity 1.5s;
        }
        h1 { font-size: 2.5rem; letter-spacing: 12px; margin-bottom: 50px; font-style: italic; font-weight: 300; text-align: center; }
        .btn {
            padding: 18px 60px; border: 1px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 2px; transition: 0.5s; letter-spacing: 4px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 40px #fff; }

        /* Loading Screen */
        #loading-screen {
            position: fixed; z-index: 30; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #fff;
        }
        .percent-text { font-family: 'Courier New'; font-size: 26px; margin-bottom: 20px; font-weight: bold; }
        .bar-container { width: 500px; height: 24px; background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 4px; }
        .bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 20px #fff; }

        /* Envelope UI */
        #envelope-wrapper {
            position: fixed; z-index: 50; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .envelope {
            width: 160px; height: 110px; background: #000; border: 2px solid #fff;
            position: relative; box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 80px solid transparent; border-right: 80px solid transparent;
            border-top: 55px solid #fff;
        }
        .heart-seal {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 28px; animation: pulse 2s infinite;
        }

        /* Final Message - ELEGANT UPDATED */
        #final-msg {
            position: fixed; z-index: 100; width: 100%; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 3.8rem; font-family: 'Times New Roman', Times, serif; 
            font-style: italic; opacity: 0; pointer-events: none;
            transition: opacity 3s ease-in-out;
            text-shadow: 0 0 15px #000, 0 0 40px #000;
            background: rgba(0, 0, 0, 0.5); padding: 40px;
        }

        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <audio id="mySong" src="music.mp3" loop preload="auto"></audio>

    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="cover-page">
        <h1>THE THEOREM OF US</h1>
        <button class="btn" onclick="initiate()">INITIATE CALCULATION</button>
    </div>

    <div id="loading-screen">
        <div class="percent-text" id="percent">0%</div>
        <div class="bar-container"><div class="bar" id="progressBar"></div></div>
    </div>

    <div id="envelope-wrapper" onclick="revealMessage()">
        <div class="envelope">
            <div class="heart-seal">❤</div>
        </div>
        <p style="color:white; font-family:'Courier New'; font-size:12px; margin-top:25px; letter-spacing:4px; font-weight:bold;">FOR MY LOVE</p>
    </div>

    <div id="final-msg">Forever Yours, My Love</div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const heart = document.getElementById('heartCanvas');
        const ctxB = bg.getContext('2d');
        const ctxH = heart.getContext('2d');
        const song = document.getElementById('mySong');

        let w, h, heartParticles = [];
        const equations = [
            "Rμν - 1/2 Rgμν = 8πG/c⁴ Tμν", "∇×E = -∂B/∂t", "iℏ∂/∂t Ψ = ĤΨ", "eiπ + 1 = 0", 
            "E = mc²", "∫e^-x² dx = √π", "ΔxΔp ≥ ℏ/2", "G_μν + Λg_μν = κT_μν", 
            "∮B·dl = μ₀I", "d/dx[ln x] = 1/x", "a² + b² = c²"
        ];
        let parts = [];

        function resize() {
            w = bg.width = heart.width = window.innerWidth;
            h = bg.height = heart.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 3.5;
                this.speedY = (Math.random() - 0.5) * 3.5;
                this.life = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.02; }
            draw() { ctxH.fillStyle = `rgba(255, 255, 255, ${this.life})`; ctxH.beginPath(); ctxH.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctxH.fill(); }
        }

        class Particle {
            constructor(initialY) { 
                this.x = Math.random() * w; 
                this.y = initialY !== undefined ? initialY : h + 60; 
                this.txt = equations[Math.floor(Math.random() * equations.length)]; 
                this.speed = 0.5 + Math.random() * 0.7; 
                this.alpha = 0.55 + Math.random() * 0.45; 
            }
            draw() { 
                ctxB.font = "15px 'Courier New'"; 
                ctxB.fillStyle = `rgba(255, 255, 255, ${this.alpha})`; 
                ctxB.fillText(this.txt, this.x, this.y); 
                this.y -= this.speed; 
                if (this.y < -60) { this.y = h + 60; this.x = Math.random() * w; } 
            }
        }
        
        // HIGHER DENSITY (Increased to 65 particles)
        for(let i=0; i<65; i++) parts.push(new Particle(Math.random() * h));

        function animateBg() { ctxB.clearRect(0,0,w,h); parts.forEach(p => p.draw()); requestAnimationFrame(animateBg); }
        animateBg();

        function drawAxis() {
            ctxH.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctxH.lineWidth = 1.2;
            // SOLID STRAIGHT LINES
            ctxH.beginPath(); ctxH.moveTo(w*0.05, h/2); ctxH.lineTo(w*0.95, h/2); ctxH.stroke();
            ctxH.beginPath(); ctxH.moveTo(w/2, h*0.05); ctxH.lineTo(w/2, h*0.95); ctxH.stroke();
            
            ctxH.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctxH.font = "italic 13px 'Courier New'";
            ctxH.fillText("Time (t)", w*0.95 - 70, h/2 - 15);
            ctxH.fillText("Affection (A)", w/2 + 15, h*0.05 + 25);
        }

        function initiate() {
            song.volume = 0; song.play();
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => { document.getElementById('cover-page').style.display = 'none'; startLoad(); }, 1500);
        }

        function startLoad() {
            const bar = document.getElementById('progressBar');
            const pct = document.getElementById('percent');
            document.getElementById('loading-screen').style.display = 'flex';
            let p = 0;
            const iv = setInterval(() => {
                p += 0.45; bar.style.width = p + '%'; pct.innerText = Math.floor(p) + "%";
                if (p >= 100) { clearInterval(iv); document.getElementById('loading-screen').style.display = 'none'; startHeart(); }
            }, 20);
        }

        function startHeart() {
            let t = 0; let pts = []; const scale = Math.min(w, h) / 45;
            let volIn = setInterval(() => { if (song.volume < 0.9) song.volume += 0.05; else clearInterval(volIn); }, 200);

            function draw() {
                if (t <= 2 * Math.PI + 0.01) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    const cx = w/2 + x * scale; const cy = h/2 + y * scale;
                    pts.push({x: cx, y: cy});
                    for(let i=0; i<4; i++) heartParticles.push(new Spark(cx, cy));

                    ctxH.clearRect(0, 0, w, h);
                    drawAxis(); 
                    heartParticles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) heartParticles.splice(i, 1); });

                    ctxH.strokeStyle = "#fff"; ctxH.lineWidth = 4.5; ctxH.shadowBlur = 30; ctxH.shadowColor = "#fff";
                    ctxH.beginPath(); ctxH.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctxH.lineTo(p.x, p.y)); ctxH.stroke();

                    t += 0.0051; requestAnimationFrame(draw);
                } else { fillHeart(pts); }
            }
            draw();
        }

        function fillHeart(pts) {
            let a = 0;
            const iv = setInterval(() => {
                a += 0.008; ctxH.fillStyle = `rgba(255, 255, 255, ${a})`;
                ctxH.beginPath(); ctxH.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctxH.lineTo(p.x, p.y)); ctxH.fill();
                if (a >= 0.65) { 
                    clearInterval(iv); 
                    document.getElementById('envelope-wrapper').style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }, 30);
        }

        function revealMessage() {
            document.getElementById('envelope-wrapper').style.transform = 'translate(-50%, -50%) scale(0)';
            setTimeout(() => {
                const msg = document.getElementById('final-msg');
                msg.style.opacity = '1';
                let volOut = setInterval(() => { if (song.volume > 0.05) song.volume -= 0.05; else { song.pause(); clearInterval(volOut); } }, 250);
            }, 800);
        }
    </script>
</body>
</html>
