<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; opacity: 0.7; } 
        #mainCanvas { z-index: 5; }

        /* Initial UI */
        #cover-page {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1s;
        }
        .btn {
            padding: 15px 45px; border: 1px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 2px; transition: 0.5s; letter-spacing: 3px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 30px #fff; }

        /* Jump Button - Elegant & Visible */
        #jump-btn-wrapper {
            position: fixed; z-index: 70; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; text-align: center;
        }
        #jump-btn {
            background: none; border: none; color: #ffcc00; /* Gold color for visibility */
            cursor: pointer; font-family: 'Great Vibes', cursive; font-size: 4rem;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.6); animation: pulse 2s infinite;
        }

        #flash { position: fixed; z-index: 150; top:0; left:0; width: 100%; height:100%; background:#fff; opacity:0; pointer-events:none; }

        #final-msg-container {
            display: none; position: fixed; z-index: 200; width: 100%; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0;
            transition: opacity 3s;
        }
        #final-msg {
            color: #fff; font-size: 4.2rem; font-style: italic; font-weight: 300;
            text-shadow: 0 0 30px rgba(255,255,255,0.8); letter-spacing: 6px;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <audio id="mySong" src="music.mp3" loop></audio>
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>
    <div id="flash"></div>

    <div id="cover-page">
        <h1 style="letter-spacing: 15px; font-weight: 100; font-style: italic; margin-bottom: 40px;">THE THEOREM OF US</h1>
        <button class="btn" onclick="initiate()">START JOURNEY</button>
    </div>

    <div id="jump-btn-wrapper">
        <button id="jump-btn" onclick="startWarp()">Jump into the Heart</button>
    </div>

    <div id="final-msg-container">
        <h2 id="final-msg">Forever Yours, My Love</h2>
    </div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const main = document.getElementById('mainCanvas');
        const ctxB = bg.getContext('2d');
        const ctxM = main.getContext('2d');
        const song = document.getElementById('mySong');
        
        let w, h, stage = "math", celestials = [], heartPts = [], t = 0;
        let heartOpenFactor = 0; // For the door opening effect
        const equations = ["E = mc²", "eiπ + 1 = 0", "∇×E = -∂B/∂t", "iℏ∂/∂t Ψ = ĤΨ", "Rμν - 1/2 Rgμν = κTμν", "F = G(m1m2/r²)", "ΔxΔp ≥ ℏ/2", "λ = h/mv"];
        let parts = [];

        function resize() {
            w = bg.width = main.width = window.innerWidth;
            h = bg.height = main.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Background Math & Grid
        class Eq {
            constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = 0.4 + Math.random()*0.8; this.txt = equations[Math.floor(Math.random()*equations.length)]; }
            draw() {
                ctxB.fillStyle = "rgba(255,255,255,0.35)";
                ctxB.font = "13px Courier New";
                ctxB.fillText(this.txt, this.x, this.y);
                this.y -= this.s; if(this.y < -50) this.y = h+50;
            }
        }
        for(let i=0; i<120; i++) parts.push(new Eq()); // Increased density

        function drawWorld() {
            ctxB.fillStyle = "#000"; ctxB.fillRect(0,0,w,h);
            if(stage === "math") {
                // Dense Small Grid
                ctxB.strokeStyle = "rgba(255,255,255,0.08)";
                ctxB.lineWidth = 0.5;
                for(let i=0; i<w; i+=30) { ctxB.beginPath(); ctxB.moveTo(i,0); ctxB.lineTo(i,h); ctxB.stroke(); }
                for(let i=0; i<h; i+=30) { ctxB.beginPath(); ctxB.moveTo(0,i); ctxB.lineTo(w,i); ctxB.stroke(); }
                parts.forEach(p => p.draw());
            } else {
                ctxB.save(); ctxB.translate(w/2, h/2);
                celestials.forEach(c => { c.update(stage==="warp"?12:0.3); c.draw(); });
                ctxB.restore();
            }
            requestAnimationFrame(drawWorld);
        }
        drawWorld();

        // Realistic Celestials
        class Celestial {
            constructor() {
                this.reset();
                this.z = Math.random()*w;
            }
            reset() {
                this.x = Math.random()*w-w/2; this.y = Math.random()*h-h/2; this.z = w;
                let r = Math.random();
                this.type = r > 0.92 ? "planet" : (r > 0.85 ? "comet" : (r > 0.80 ? "meteor" : "star"));
                this.size = this.type === "planet" ? (3+Math.random()*5) : 1;
                this.color = this.type === "planet" ? `hsl(${Math.random()*360}, 40%, 70%)` : "#fff";
                this.speedMult = this.type === "meteor" ? 2.5 : 1;
            }
            update(speed) {
                this.z -= speed * this.speedMult;
                if(this.z <= 0) this.reset();
            }
            draw() {
                let scale = w / this.z;
                let sx = this.x * scale; let sy = this.y * scale;
                let r = this.size * scale;
                ctxB.fillStyle = this.color;
                ctxB.beginPath(); ctxB.arc(sx, sy, r > 15 ? 15 : r, 0, Math.PI*2); ctxB.fill();
                
                // Tail for Comet/Meteor/Warp
                if(this.type === "comet" || this.type === "meteor" || stage === "warp") {
                    ctxB.strokeStyle = this.type === "meteor" ? "rgba(255,255,255,0.6)" : "rgba(200,220,255,0.3)";
                    ctxB.beginPath(); ctxB.moveTo(sx, sy);
                    let tail = this.type === "meteor" ? 60 : 30;
                    ctxB.lineTo(this.x * (w/(this.z+tail)), this.y * (w/(this.z+tail)));
                    ctxB.stroke();
                }
            }
        }

        function initiate() {
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('cover-page').style.display = 'none'; 
                song.play(); // Music starts with drawing
                startHeart(); 
            }, 1000);
        }

        function startHeart() {
            const scale = Math.min(w,h)/42;
            const drawH = () => {
                if(t <= 2 * Math.PI + 0.02) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
                    heartPts.push({x: w/2 + x * scale, y: h/2 + y * scale});
                    ctxM.clearRect(0,0,w,h);
                    
                    // FULL SCREEN AXIS
                    ctxM.strokeStyle = "rgba(255,255,255,0.4)"; ctxM.lineWidth = 1;
                    ctxM.beginPath(); ctxM.moveTo(0, h/2); ctxM.lineTo(w, h/2); ctxM.stroke();
                    ctxM.beginPath(); ctxM.moveTo(w/2, 0); ctxM.lineTo(w/2, h); ctxM.stroke();
                    
                    // SOLID HEART
                    ctxM.strokeStyle = "#fff"; ctxM.lineWidth = 5; ctxM.shadowBlur = 0; // Solid Edge
                    ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                    heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.stroke();
                    t += 0.01; requestAnimationFrame(drawH);
                } else {
                    let a = 0;
                    const fill = setInterval(() => {
                        a += 0.015; ctxM.fillStyle = `rgba(255,255,255,${a})`;
                        ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                        heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.fill();
                        if(a >= 0.85) { clearInterval(fill); document.getElementById('jump-btn-wrapper').style.display = 'block'; }
                    }, 30);
                }
            };
            drawH();
        }

        function startWarp() {
            document.getElementById('jump-btn-wrapper').style.display = 'none';
            for(let i=0; i<350; i++) celestials.push(new Celestial());
            
            // Door Opening Effect
            const openDoor = () => {
                heartOpenFactor += 15;
                ctxM.clearRect(0,0,w,h);
                ctxM.save();
                
                // Left Half
                ctxM.save();
                ctxM.translate(-heartOpenFactor, 0);
                ctxM.beginPath(); ctxM.rect(0, 0, w/2, h); ctxM.clip();
                drawHeartToM();
                ctxM.restore();

                // Right Half
                ctxM.save();
                ctxM.translate(heartOpenFactor, 0);
                ctxM.beginPath(); ctxM.rect(w/2, 0, w/2, h); ctxM.clip();
                drawHeartToM();
                ctxM.restore();
                
                ctxM.restore();

                if(heartOpenFactor < w/2 + 200) {
                    requestAnimationFrame(openDoor);
                } else {
                    stage = "warp";
                    setTimeout(() => {
                        const f = document.getElementById('flash');
                        f.style.opacity = '1';
                        setTimeout(() => {
                            stage = "final"; f.style.opacity = '0'; f.style.transition = 'opacity 4s';
                            document.getElementById('final-msg-container').style.display = 'block';
                            setTimeout(() => document.getElementById('final-msg-container').style.opacity = '1', 100);
                        }, 150);
                    }, 8000);
                }
            };
            openDoor();
        }

        function drawHeartToM() {
            ctxM.fillStyle = "#fff";
            ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
            heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.fill();
        }
    </script>
</body>
</html>
