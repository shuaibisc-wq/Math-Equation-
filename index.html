<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theorem of Love | Prova</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #030303; font-family: 'Georgia', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; } 
        #heartCanvas { z-index: 5; }

        /* Cover Page */
        #cover-page {
            position: fixed; z-index: 20; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(20,20,20,0.9) 0%, rgba(5,5,5,1) 100%); 
            color: white; transition: opacity 1.5s;
        }

        h1 { font-size: 2.8rem; letter-spacing: 12px; margin-bottom: 50px; font-style: italic; text-align: center; font-weight: 300; }
        
        .btn {
            padding: 18px 60px; border: 1px solid rgba(255,255,255,0.5); background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 50px; transition: 0.5s; letter-spacing: 4px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 40px rgba(255,255,255,0.6); transform: scale(1.05); }

        /* Loading Screen - Widened Bar */
        #loading-screen {
            position: fixed; z-index: 30; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; color: #fff;
        }
        .bar-container { 
            width: 500px; /* WIDENED BAR */
            height: 2px; 
            background: rgba(255,255,255,0.1); 
            margin-top: 30px; 
            border-radius: 10px;
            overflow: hidden;
        }
        .bar { width: 0%; height: 100%; background: #ff2d55; box-shadow: 0 0 20px #ff2d55; transition: width 0.1s; }

        /* Final Message */
        #final-msg {
            position: fixed; z-index: 40; width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%); color: white;
            font-size: 3.5rem; font-style: italic; opacity: 0; 
            transition: opacity 4s ease-in-out; text-shadow: 0 0 30px #ff1493; pointer-events: none;
        }
        
        .loading-text { font-family: 'Courier New'; letter-spacing: 6px; font-size: 14px; color: #ff2d55; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    <canvas id="heartCanvas"></canvas>

    <div id="cover-page">
        <h1>THE THEOREM OF US</h1>
        <button class="btn" onclick="initiate()">INITIATE SYSTEM</button>
    </div>

    <div id="loading-screen">
        <div class="loading-text">SOLVING COMPLEX IDENTITIES...</div>
        <div class="bar-container"><div class="bar" id="progressBar"></div></div>
    </div>

    <div id="final-msg">I Love You, Prova</div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const heart = document.getElementById('heartCanvas');
        const ctxB = bg.getContext('2d');
        const ctxH = heart.getContext('2d');

        let w, h;
        const equations = [
            "Rμν - 1/2 Rgμν = 8πG/c⁴ Tμν", "∇×E = -∂B/∂t", "∫e^-x² dx = √π",
            "iℏ∂/∂t Ψ = ĤΨ", "eiπ + 1 = 0", "P(A|B) = P(B|A)P(A)/P(B)",
            "L = T - V", "E = mc²", "ΔxΔp ≥ ℏ/2", "d/dx[sin x] = cos x",
            "G_μν + Λg_μν = κT_μν", "∮E·dA = Q/ε₀"
        ];
        let parts = [];

        function resize() {
            w = bg.width = heart.width = window.innerWidth;
            h = bg.height = heart.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); this.y = Math.random() * h; }
            reset() {
                this.x = Math.random() * w;
                this.y = h + 20;
                this.txt = equations[Math.floor(Math.random() * equations.length)];
                this.speed = 0.4 + Math.random() * 0.8;
                this.alpha = 0.2 + Math.random() * 0.5;
            }
            draw() {
                ctxB.font = "15px 'Courier New'";
                ctxB.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctxB.fillText(this.txt, this.x, this.y);
                this.y -= this.speed;
                if (this.y < -20) this.reset();
            }
        }
        for(let i=0; i<45; i++) parts.push(new Particle());

        function animateBg() {
            ctxB.clearRect(0,0,w,h);
            parts.forEach(p => p.draw());
            requestAnimationFrame(animateBg);
        }
        animateBg();

        function drawCoordinates() {
            ctxH.setLineDash([5, 15]); // Charming dashed lines
            ctxH.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctxH.lineWidth = 1;
            
            ctxH.beginPath(); ctxH.moveTo(0, h/2); ctxH.lineTo(w, h/2); ctxH.stroke();
            ctxH.beginPath(); ctxH.moveTo(w/2, 0); ctxH.lineTo(w/2, h); ctxH.stroke();
            
            ctxH.setLineDash([]); // Reset
            ctxH.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctxH.font = "italic 12px Georgia";
            ctxH.fillText("Time Complexity", w - 120, h/2 - 15);
            ctxH.fillText("Affection Magnitude", w/2 + 20, 30);
        }

        function initiate() {
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover-page').style.display = 'none';
                startLoad();
            }, 1500);
        }

        function startLoad() {
            const bar = document.getElementById('progressBar');
            document.getElementById('loading-screen').style.display = 'flex';
            let p = 0;
            const iv = setInterval(() => {
                p += 0.4;
                bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('loading-screen').style.display = 'none';
                    startHeart();
                }
            }, 20); // Smooth 5s load
        }

        function startHeart() {
            let t = 0;
            let pts = [];
            function draw() {
                if (t <= 2 * Math.PI) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const s = Math.min(w, h) / 45;
                    const cx = w/2 + x * s;
                    const cy = h/2 + y * s;
                    pts.push({x: cx, y: cy});

                    ctxH.clearRect(0, 0, w, h);
                    drawCoordinates();

                    ctxH.strokeStyle = "#ff2d55";
                    ctxH.lineWidth = 4;
                    ctxH.shadowBlur = 25;
                    ctxH.shadowColor = "#ff2d55";
                    
                    ctxH.beginPath();
                    ctxH.moveTo(pts[0].x, pts[0].y);
                    pts.forEach(p => ctxH.lineTo(p.x, p.y));
                    ctxH.stroke();

                    t += 0.0051; // Slow 20s draw
                    requestAnimationFrame(draw);
                } else {
                    fillHeart(pts);
                }
            }
            draw();
        }

        function fillHeart(pts) {
            let a = 0;
            const iv = setInterval(() => {
                a += 0.008;
                ctxH.fillStyle = `rgba(255, 45, 85, ${a})`;
                ctxH.shadowBlur = 40;
                ctxH.beginPath();
                ctxH.moveTo(pts[0].x, pts[0].y);
                pts.forEach(p => ctxH.lineTo(p.x, p.y));
                ctxH.fill();
                if (a >= 0.7) {
                    clearInterval(iv);
                    document.getElementById('final-msg').style.opacity = '1';
                }
            }, 30);
        }
    </script>
</body>
</html>
