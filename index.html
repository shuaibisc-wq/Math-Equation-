<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Prova</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,400;1,600&display=swap');

        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Times New Roman', serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; opacity: 0.8; } 
        #mainCanvas { z-index: 5; }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; z-index: 200; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .bar-container { width: 280px; height: 6px; border: 1px solid #444; padding: 3px; margin-top: 20px; }
        .bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; }
        #percent-text { font-family: 'Courier New'; font-size: 14px; margin-top: 10px; color: #fff; letter-spacing: 2px; }

        #cover-page {
            position: fixed; z-index: 100; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; transition: opacity 1s;
        }
        .btn {
            padding: 15px 45px; border: 1px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Courier New', monospace;
            border-radius: 2px; transition: 0.5s; letter-spacing: 3px;
        }
        .btn:hover { background: white; color: black; box-shadow: 0 0 30px #fff; }

        #jump-btn-wrapper {
            position: fixed; z-index: 70; top: 55%; left: 50%; transform: translate(-50%, -50%);
            display: none; text-align: center;
        }
        #jump-btn {
            background: none; border: none; color: #ffcc00;
            cursor: pointer; font-family: 'Great Vibes', cursive; font-size: 3.5rem;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.7); animation: pulse 2s infinite;
        }

        #flash { position: fixed; z-index: 150; top:0; left:0; width: 100%; height:100%; background:#fff; opacity:0; pointer-events:none; }

        #final-msg-container {
            display: none; position: fixed; z-index: 180; width: 100%; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0;
            transition: opacity 3s; pointer-events: none;
        }
        #final-msg {
            color: #fff; font-size: 3.8rem; font-style: italic; font-weight: 300;
            text-shadow: 0 0 30px rgba(255,255,255,0.8); letter-spacing: 5px;
            margin-bottom: 30px;
        }

        #will-you-be-mine-container {
            display: none; position: fixed; z-index: 185; width: 100%; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0;
            transition: opacity 4s;
        }
        #will-you-be-mine {
            color: #fff; font-size: 4rem; font-family: 'Crimson Text', serif;
            font-style: italic; font-weight: 600;
            text-shadow: 0 0 25px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.6);
            letter-spacing: 2px;
            animation: shining 3s infinite alternate;
        }

        #interaction-container {
            display: none; position: fixed; z-index: 190; width: 100%; text-align: center;
            bottom: 10%; left: 50%; transform: translateX(-50%);
        }
        .interact-btn {
            padding: 15px 40px; border: 2px solid #fff; background: none;
            color: white; cursor: pointer; font-family: 'Great Vibes', cursive;
            font-size: 2.2rem; border-radius: 5px; transition: 0.5s;
            margin: 0 20px;
            text-shadow: 0 0 15px #fff, 0 0 5px #ffcccc;
        }
        #yes-btn:hover { background: #ffcc00; color: black; box-shadow: 0 0 30px #ffcc00; }
        #no-btn:hover { background: #ff4d4d; color: black; box-shadow: 0 0 30px #ff4d4d; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shining { 0% { text-shadow: 0 0 25px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.6); } 100% { text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 60px rgba(255,255,255,0.8); } }
    </style>
</head>
<body>

    <audio id="mySong" src="music.mp3" loop></audio>
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>
    <div id="flash"></div>

    <div id="cover-page">
        <h1 style="letter-spacing: 15px; font-weight: 100; font-style: italic; margin-bottom: 40px;">THE THEOREM OF US</h1>
        <button class="btn" onclick="initiateSequence()">START JOURNEY</button>
    </div>

    <div id="loading-screen">
        <div style="font-family:'Courier New'; letter-spacing:4px; font-size:12px; color:#fff;">SYNCHRONIZING REALITIES...</div>
        <div class="bar-container"><div class="bar" id="progressBar"></div></div>
        <div id="percent-text">0%</div>
    </div>

    <div id="jump-btn-wrapper">
        <button id="jump-btn" onclick="startWarp()">Jump into the Heart</button>
    </div>

    <div id="final-msg-container">
        <h2 id="final-msg">Forever Yours, My Love</h2>
    </div>

    <div id="will-you-be-mine-container">
        <h2 id="will-you-be-mine">Will you be mine forever 🥺?</h2>
    </div>

    <div id="interaction-container">
        <button id="yes-btn" class="interact-btn" onclick="sayYes()">YES</button>
        <button id="no-btn" class="interact-btn" onclick="sayNo()">NO</button>
    </div>

    <script>
        const bg = document.getElementById('bgCanvas');
        const main = document.getElementById('mainCanvas');
        const ctxB = bg.getContext('2d');
        const ctxM = main.getContext('2d');
        const song = document.getElementById('mySong');
        
        let w, h, stage = "math", celestials = [], heartPts = [], t = 0;
        let heartOpenFactor = 0;
        let heartScaleFactor = 1; // For the heart enlarging effect
        const equations = ["E = mc²", "eiπ + 1 = 0", "∇×E = -∂B/∂t", "iℏ∂/∂t Ψ = ĤΨ", "Rμν - 1/2 Rgμν = κTμν", "F = G(m1m2/r²)", "ΔxΔp ≥ ℏ/2"];
        let parts = [];
        let interactionStars = [];

        function resize() {
            w = bg.width = main.width = window.innerWidth;
            h = bg.height = main.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Background Logic
        class Eq {
            constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.s = 0.5 + Math.random()*0.5; this.txt = equations[Math.floor(Math.random()*equations.length)]; }
            draw() {
                ctxB.fillStyle = "rgba(255,255,255,0.35)";
                ctxB.font = "12px Courier New";
                ctxB.fillText(this.txt, this.x, this.y);
                this.y -= this.s; if(this.y < -50) this.y = h+50;
            }
        }
        for(let i=0; i<150; i++) parts.push(new Eq());

        function drawWorld() {
            ctxB.fillStyle = "#000"; ctxB.fillRect(0,0,w,h);
            if(stage === "math") {
                // Finer Grid and Clearer Axis for Prova
                ctxB.strokeStyle = "rgba(255,255,255,0.2)"; // More visible lines
                ctxB.lineWidth = 0.7; // Slightly thicker for clarity
                for(let i=0; i<w; i+=30) { ctxB.beginPath(); ctxB.moveTo(i,0); ctxB.lineTo(i,h); ctxB.stroke(); }
                for(let i=0; i<h; i+=30) { ctxB.beginPath(); ctxB.moveTo(0,i); ctxB.lineTo(w,i); ctxB.stroke(); }
                parts.forEach(p => p.draw());
            } else {
                ctxB.save(); ctxB.translate(w/2, h/2);
                celestials.forEach(c => { c.update(stage==="warp"?14:0.4); c.draw(); });
                ctxB.restore();
            }
            requestAnimationFrame(drawWorld);
        }
        drawWorld();

        class Celestial {
            constructor() { this.reset(); this.z = Math.random()*w; }
            reset() {
                this.x = Math.random()*w-w/2; this.y = Math.random()*h-h/2; this.z = w;
                let r = Math.random();
                this.type = r > 0.93 ? "planet" : (r > 0.86 ? "comet" : (r > 0.80 ? "meteor" : "star"));
                this.size = this.type === "planet" ? (4+Math.random()*6) : 1.2;
                this.color = this.type === "planet" ? `hsl(${Math.random()*360}, 50%, 75%)` : "#fff";
                this.speedMult = this.type === "meteor" ? 2.8 : 1;
            }
            update(speed) { this.z -= speed * this.speedMult; if(this.z <= 0) this.reset(); }
            draw() {
                let scale = w / this.z;
                let sx = this.x * scale; let sy = this.y * scale;
                let r = this.size * scale;
                ctxB.fillStyle = this.color;
                ctxB.beginPath(); ctxB.arc(sx, sy, r > 15 ? 15 : r, 0, Math.PI*2); ctxB.fill();
                if(this.type === "comet" || this.type === "meteor" || stage === "warp") {
                    ctxB.strokeStyle = this.type === "meteor" ? "rgba(255,255,255,0.7)" : "rgba(180,210,255,0.3)";
                    ctxB.beginPath(); ctxB.moveTo(sx, sy);
                    ctxB.lineTo(this.x * (w/(this.z+40)), this.y * (w/(this.z+40))); ctxB.stroke();
                }
            }
        }

        // Functions
        function initiateSequence() {
            document.getElementById('cover-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover-page').style.display = 'none';
                startLoading();
            }, 1000);
        }

        function startLoading() {
            const screen = document.getElementById('loading-screen');
            const bar = document.getElementById('progressBar');
            const pText = document.getElementById('percent-text');
            screen.style.display = 'flex';
            let p = 0;
            const iv = setInterval(() => {
                p += 0.6; 
                if(p > 100) p = 100;
                bar.style.width = p + '%';
                pText.innerText = Math.floor(p) + '%';
                if(p >= 100) {
                    clearInterval(iv);
                    setTimeout(() => { 
                        screen.style.opacity = '0';
                        setTimeout(() => { 
                            screen.style.display = 'none'; 
                            song.play(); 
                            startHeartAnim(); 
                        }, 600);
                    }, 400);
                }
            }, 25);
        }

        function startHeartAnim() {
            const scale = Math.min(w,h)/42;
            const drawH = () => {
                if(t <= 2 * Math.PI + 0.02) {
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
                    heartPts.push({x: w/2 + x * scale, y: h/2 + y * scale});
                    ctxM.clearRect(0,0,w,h);
                    
                    // CLEARER AXIS
                    ctxM.strokeStyle = "rgba(255,255,255,0.7)"; // More visible axis
                    ctxM.lineWidth = 1.2;
                    ctxM.beginPath(); ctxM.moveTo(0, h/2); ctxM.lineTo(w, h/2); ctxM.stroke();
                    ctxM.beginPath(); ctxM.moveTo(w/2, 0); ctxM.lineTo(w/2, h); ctxM.stroke();
                    
                    // SOLID HEART
                    ctxM.strokeStyle = "#fff"; ctxM.lineWidth = 5.5; ctxM.shadowBlur = 0;
                    ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                    heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.stroke();
                    
                    t += 0.0065; 
                    requestAnimationFrame(drawH);
                } else {
                    let a = 0;
                    const fill = setInterval(() => {
                        a += 0.02; ctxM.fillStyle = `rgba(255,255,255,${a})`;
                        ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
                        heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.fill();
                        if(a >= 0.85) { clearInterval(fill); document.getElementById('jump-btn-wrapper').style.display = 'block'; }
                    }, 30);
                }
            };
            drawH();
        }

        function startWarp() {
            document.getElementById('jump-btn-wrapper').style.display = 'none';
            for(let i=0; i<380; i++) celestials.push(new Celestial());
            
            const enlargeHeart = () => {
                heartScaleFactor *= 1.05; // Continuously enlarge heart
                ctxM.clearRect(0,0,w,h);
                ctxM.save();
                ctxM.translate(w/2, h/2); // Move origin to center
                ctxM.scale(heartScaleFactor, heartScaleFactor); // Enlarge everything
                ctxM.translate(-w/2, -h/2); // Move origin back

                drawH_Static(); // Draw the full heart but now enlarged and clipped

                ctxM.restore();

                // Check if heart has grown significantly
                if(heartScaleFactor < 150) { // Keep enlarging until we pass through
                    requestAnimationFrame(enlargeHeart);
                } else {
                    // Enter warp phase as heart has grown past screen
                    ctxM.clearRect(0,0,w,h);
                    stage = "warp";
                    setTimeout(() => {
                        const f = document.getElementById('flash');
                        f.style.opacity = '1';
                        setTimeout(() => {
                            stage = "final"; f.style.opacity = '0';
                            document.getElementById('final-msg-container').style.display = 'block';
                            setTimeout(() => document.getElementById('final-msg-container').style.opacity = '1', 100);
                            
                            // Start "Will you be mine" logic after "Forever Yours"
                            setTimeout(() => {
                                document.getElementById('final-msg-container').style.opacity = '0';
                                setTimeout(() => {
                                    document.getElementById('final-msg-container').style.display = 'none';
                                    showTheQuestion();
                                }, 3000);
                            }, 5000);
                        }, 150);
                    }, 8500);
                }
            };
            enlargeHeart();
        }

        function drawH_Static() {
            ctxM.fillStyle = "#fff";
            ctxM.beginPath(); ctxM.moveTo(heartPts[0].x, heartPts[0].y);
            heartPts.forEach(p => ctxM.lineTo(p.x, p.y)); ctxM.fill();
        }

        function showTheQuestion() {
            const question = document.getElementById('will-you-be-mine-container');
            question.style.display = 'block';
            setTimeout(() => { question.style.opacity = '1'; }, 100);
            
            // Show interaction after a short pause
            setTimeout(() => {
                const interaction = document.getElementById('interaction-container');
                interaction.style.display = 'block';
            }, 6000);
        }

        function sayNo() {
            song.pause(); // Stop music
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('cover-page').style.display = 'none';
            document.getElementById('mainCanvas').style.display = 'none';
            document.getElementById('bgCanvas').style.display = 'none';
            document.getElementById('final-msg-container').style.display = 'none';
            document.getElementById('will-you-be-mine-container').style.display = 'none';
            document.getElementById('interaction-container').style.display = 'none';
            document.body.style.backgroundColor = '#000'; // Make everything black
        }

        function sayYes() {
            window.location.href = 'yes.html'; // Redirect to the "YES" stage page
        }
    </script>
</body>
</html>
